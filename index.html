<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Resource Downloader Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status::-webkit-scrollbar { width: 6px; }
        #status::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        .log-entry { border-bottom: 1px solid #1e293b; padding: 2px 0; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-8 font-sans">

    <div class="max-w-4xl mx-auto bg-slate-800 p-6 rounded-xl shadow-2xl border border-slate-700">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
            <h1 class="text-3xl font-bold text-blue-400 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                Resource Saver v3
            </h1>
            <div class="flex gap-2">
                <button onclick="copyLog()" class="bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded text-xs transition-colors flex items-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" /></svg>
                    ログをコピー
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="md:col-span-2">
                <label class="block text-xs font-medium text-slate-500 mb-1 uppercase tracking-wider">対象URL</label>
                <input type="text" id="targetUrl" placeholder="https://bloxd.io" class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500 text-white transition-all">
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-500 mb-1 uppercase tracking-wider">優先プロキシ</label>
                <select id="proxySelect" class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500 text-white">
                    <option value="https://api.allorigins.win/raw?url=">AllOrigins (安定版)</option>
                    <option value="https://api.codetabs.com/v1/proxy?quest=">CodeTabs (大容量・制限少)</option>
                    <option value="https://corsproxy.io/?">CorsProxy.io (高速・小容量)</option>
                </select>
            </div>
        </div>

        <button onclick="startDownload()" id="downloadBtn" class="w-full bg-blue-600 hover:bg-blue-500 active:scale-[0.98] transition-all px-6 py-4 rounded-lg font-bold text-lg shadow-lg flex items-center justify-center gap-2 mb-6">
            <span>一括取得開始</span>
        </button>

        <div id="statusContainer" class="hidden">
            <div class="flex items-center justify-between mb-2">
                <h2 class="text-sm font-semibold text-slate-300 flex items-center gap-2">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                    </span>
                    リアルタイム・プロセスログ
                </h2>
                <button onclick="clearLog()" class="text-xs text-slate-500 hover:text-slate-300 underline">クリア</button>
            </div>
            <div id="status" class="bg-[#0f172a] p-4 rounded-lg font-mono text-[11px] overflow-y-auto h-[450px] border border-slate-700 leading-relaxed text-blue-200 shadow-inner">
            </div>
        </div>
    </div>

    <footer class="max-w-4xl mx-auto mt-8 text-center text-slate-500 text-xs">
        <p>※bloxd.ioのような動的サイトは、プロキシブロックが強力な場合があります。取得できなかったファイルは個別にダウンロードが必要になることがあります。</p>
    </footer>

    <script>
        const statusDiv = document.getElementById('status');
        const statusContainer = document.getElementById('statusContainer');
        const downloadBtn = document.getElementById('downloadBtn');
        
        // プロキシリスト（正しいAPIエンドポイントに修正）
        const PROXIES = [
            "https://api.allorigins.win/raw?url=",
            "https://api.codetabs.com/v1/proxy?quest=",
            "https://corsproxy.io/?",
            "https://thingproxy.freeboard.io/fetch/"
        ];

        function log(msg, type = 'info') {
            statusContainer.classList.remove('hidden');
            const entry = document.createElement('div');
            entry.className = "log-entry break-all";
            const time = new Date().toLocaleTimeString();
            
            let color = "text-blue-300";
            if(type === 'error') color = "text-red-400 font-bold";
            if(type === 'warn') color = "text-yellow-400";
            if(type === 'success') color = "text-green-400";

            entry.innerHTML = `<span class="text-slate-500">[${time}]</span> <span class="${color}">${msg}</span>`;
            statusDiv.appendChild(entry);
            statusDiv.scrollTop = statusDiv.scrollHeight;
        }

        function clearLog() { statusDiv.innerHTML = ""; }

        async function copyLog() {
            const text = Array.from(statusDiv.children).map(el => el.innerText).join('\n');
            try {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                alert("ログをクリップボードにコピーしました");
            } catch (err) {
                console.error("Copy failed", err);
            }
        }

        function setButtonLoading(isLoading) {
            downloadBtn.disabled = isLoading;
            if (isLoading) {
                downloadBtn.innerHTML = '<div class="loading-spinner"></div> 処理中...';
                downloadBtn.className = "w-full bg-slate-600 px-6 py-4 rounded-lg font-bold text-lg flex items-center justify-center gap-2 mb-6 cursor-not-allowed";
            } else {
                downloadBtn.innerHTML = '<span>一括取得開始</span>';
                downloadBtn.className = "w-full bg-blue-600 hover:bg-blue-500 active:scale-[0.98] transition-all px-6 py-4 rounded-lg font-bold text-lg shadow-lg flex items-center justify-center gap-2 mb-6";
            }
        }

        async function smartFetch(targetUrl, preferredProxy) {
            let proxyList = [preferredProxy, ...PROXIES.filter(p => p !== preferredProxy)];
            
            for (let proxy of proxyList) {
                try {
                    let fullUrl = proxy + encodeURIComponent(targetUrl);
                    let hostname = new URL(proxy).hostname;
                    
                    const response = await fetch(fullUrl, { 
                        cache: 'no-store' // キャッシュを回避して常に最新を取得
                    });

                    if (response.ok) return response;
                    
                    if (response.status === 413) {
                        log(`[!] ファイルが大きすぎます (${hostname})`, 'warn');
                        continue;
                    }
                    if (response.status === 403 || response.status === 522 || response.status === 500) {
                        log(`[!] ${hostname} で失敗 (${response.status})。次を試します...`, 'warn');
                        continue;
                    }
                } catch (e) {
                    let hostname = new URL(proxy).hostname;
                    log(`[!] ${hostname} への接続エラー`, 'warn');
                }
            }
            throw new Error(`すべてのプロキシでブロックされました: ${targetUrl.split('/').pop()}`);
        }

        async function startDownload() {
            let urlInput = document.getElementById('targetUrl').value.trim();
            const preferredProxy = document.getElementById('proxySelect').value;

            if (!urlInput) return alert("URLを入力してください");
            if (!urlInput.startsWith('http')) urlInput = 'https://' + urlInput;
            
            clearLog();
            setButtonLoading(true);
            log(`🎯 解析ターゲット: ${urlInput}`);

            const zip = new JSZip();
            const fetchedUrls = new Set();

            try {
                log("📡 メインHTMLを取得しています...");
                const mainResponse = await smartFetch(urlInput, preferredProxy);
                const htmlText = await mainResponse.text();
                zip.file("index.html", htmlText);
                log("✅ index.html の保存に成功しました", "success");

                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlText, "text/html");
                const resources = [];

                const map = [
                    { tag: 'img', attr: 'src', folder: 'images' },
                    { tag: 'link[rel="stylesheet"]', attr: 'href', folder: 'css' },
                    { tag: 'script[src]', attr: 'src', folder: 'js' },
                    { tag: 'link[rel*="icon"]', attr: 'href', folder: 'favicons' }
                ];

                map.forEach(m => {
                    doc.querySelectorAll(m.tag).forEach(el => {
                        let link = el.getAttribute(m.attr);
                        if (link && !link.startsWith('data:')) {
                            try {
                                const abs = new URL(link, urlInput).href;
                                if (!fetchedUrls.has(abs)) {
                                    resources.push({ url: abs, folder: m.folder, type: m.tag });
                                    fetchedUrls.add(abs);
                                }
                            } catch(e) {}
                        }
                    });
                });

                log(`📦 ${resources.length} 個のリソースを取得順次処理します...`);

                const downloadOne = async (res, idx) => {
                    try {
                        const fileName = new URL(res.url).pathname.split('/').pop() || `file_${idx}`;
                        // キャッシュバスター（?v=2など）が含まれるURLを安全にエンコードして渡す
                        const response = await smartFetch(res.url, preferredProxy);
                        const blob = await response.blob();
                        zip.file(`${res.folder}/${fileName}`, blob);
                        log(`🔹 取得成功: ${fileName}`, 'success');
                    } catch (e) {
                        log(`❌ 取得失敗: ${res.url}`, 'error');
                    }
                };

                // 並列リクエスト数を制御（サーバー負荷軽減・Cloudflare対策）
                const batchSize = 2;
                for (let i = 0; i < resources.length; i += batchSize) {
                    const batch = resources.slice(i, i + batchSize);
                    await Promise.all(batch.map((r, idx) => downloadOne(r, i + idx)));
                }

                log("⚙️ ZIPデータを生成中...");
                const content = await zip.generateAsync({ type: "blob" });
                const host = new URL(urlInput).hostname;
                saveAs(content, `dump_${host}.zip`);
                log("🏁 全ての工程が完了しました。ファイルを保存しました。", "success");

            } catch (err) {
                log(`🛑 停止エラー: ${err.message}`, 'error');
            } finally {
                setButtonLoading(false);
            }
        }
    </script>
</body>
</html>
