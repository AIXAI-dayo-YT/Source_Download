<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Resource Downloader Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status::-webkit-scrollbar { width: 6px; }
        #status::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        .log-entry { border-bottom: 1px solid #1e293b; padding: 2px 0; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-8 font-sans">

    <div class="max-w-4xl mx-auto bg-slate-800 p-6 rounded-xl shadow-2xl border border-slate-700">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
            <h1 class="text-3xl font-bold text-blue-400 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
                </svg>
                Resource Saver v3.2 [Ultimate]
            </h1>
            <div class="flex gap-2">
                <button onclick="copyLog()" class="bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded text-xs transition-colors">ログコピー</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="md:col-span-2">
                <label class="block text-xs font-medium text-slate-500 mb-1 uppercase">対象URL</label>
                <input type="text" id="targetUrl" placeholder="https://bloxd.io" class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 text-white">
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-500 mb-1 uppercase">優先プロキシ</label>
                <select id="proxySelect" class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 text-white">
                    <option value="https://api.codetabs.com/v1/proxy?quest=">CodeTabs (推奨: 大容量)</option>
                    <option value="https://api.allorigins.win/raw?url=">AllOrigins (安定版)</option>
                    <option value="https://corsproxy.io/?">CorsProxy.io (高速)</option>
                </select>
            </div>
        </div>

        <button onclick="startDownload()" id="downloadBtn" class="w-full bg-blue-600 hover:bg-blue-500 transition-all px-6 py-4 rounded-lg font-bold text-lg shadow-lg flex items-center justify-center gap-2 mb-6">
            <span>JS全取得・一括ダウンロード</span>
        </button>

        <div id="statusContainer" class="hidden">
            <div id="status" class="bg-[#0f172a] p-4 rounded-lg font-mono text-[11px] overflow-y-auto h-[480px] border border-slate-700 text-blue-200">
            </div>
        </div>
    </div>

    <footer class="max-w-4xl mx-auto mt-8 text-center text-slate-500 text-[10px] space-y-1">
        <p>※JS内の動的パスをスキャンし、WASMやJSON等の重要アセットも追跡します。</p>
        <p>※取得漏れを防ぐため、1ファイルにつき1.5秒の待機時間を設けています。</p>
    </footer>

    <script>
        const statusDiv = document.getElementById('status');
        const statusContainer = document.getElementById('statusContainer');
        const downloadBtn = document.getElementById('downloadBtn');
        const sleep = ms => new Promise(res => setTimeout(res, ms));

        const PROXIES = [
            "https://api.codetabs.com/v1/proxy?quest=",
            "https://api.allorigins.win/raw?url=",
            "https://corsproxy.io/?",
            "https://thingproxy.freeboard.io/fetch/"
        ];

        function log(msg, type = 'info') {
            statusContainer.classList.remove('hidden');
            const entry = document.createElement('div');
            entry.className = "log-entry";
            let color = "text-blue-300";
            if(type === 'error') color = "text-red-400 font-bold";
            if(type === 'success') color = "text-green-400";
            entry.innerHTML = `<span class="text-slate-500">[${new Date().toLocaleTimeString()}]</span> <span class="${color}">${msg}</span>`;
            statusDiv.appendChild(entry);
            statusDiv.scrollTop = statusDiv.scrollHeight;
        }

        async function smartFetch(targetUrl, preferredProxy, retryCount = 1) {
            let proxyList = [preferredProxy, ...PROXIES.filter(p => p !== preferredProxy)];
            for (let proxy of proxyList) {
                try {
                    const response = await fetch(proxy + encodeURIComponent(targetUrl));
                    if (response.ok) return response;
                } catch (e) {}
            }
            if (retryCount > 0) {
                await sleep(2000);
                return smartFetch(targetUrl, preferredProxy, retryCount - 1);
            }
            throw new Error("Fetch Failed");
        }

        async function startDownload() {
            let urlInput = document.getElementById('targetUrl').value.trim();
            const preferredProxy = document.getElementById('proxySelect').value;
            if (!urlInput) return alert("URLを入力してください");
            if (!urlInput.startsWith('http')) urlInput = 'https://' + urlInput;

            statusDiv.innerHTML = "";
            downloadBtn.disabled = true;
            downloadBtn.innerText = "解析中...";
            log(`🎯 開始: ${urlInput}`);

            const zip = new JSZip();
            const fetchedUrls = new Set();
            const queue = [];

            try {
                // 1. HTML取得
                const htmlRes = await smartFetch(urlInput, preferredProxy);
                const html = await htmlRes.text();
                zip.file("index.html", html);
                log("✅ HTML保存完了", "success");

                // 2. 基本リソース抽出 (JS, CSS, WASM, JSON, Images)
                const doc = new DOMParser().parseFromString(html, "text/html");
                
                // Scriptタグ
                doc.querySelectorAll('script[src]').forEach(s => queue.push({url: s.src, folder: 'js'}));
                // Linkタグ (CSS, Manifest, Favicon)
                doc.querySelectorAll('link[href]').forEach(l => {
                    if(l.rel.includes('stylesheet')) queue.push({url: l.href, folder: 'css'});
                    else if(l.href.match(/\.(json|wasm|data)/)) queue.push({url: l.href, folder: 'assets'});
                    else queue.push({url: l.href, folder: 'favicons'});
                });
                // Imageタグ
                doc.querySelectorAll('img[src]').forEach(i => queue.push({url: i.src, folder: 'images'}));

                // URLを絶対パスに変換
                const normalizedQueue = queue.map(item => {
                    try { return { ...item, url: new URL(item.url, urlInput).href }; } catch(e) { return null; }
                }).filter(i => i && !fetchedUrls.has(i.url));

                log(`📦 初期リスト: ${normalizedQueue.length}個のファイルを検出`);

                // 3. 順次ダウンロード & ディープ・スキャン
                for (let i = 0; i < normalizedQueue.length; i++) {
                    const res = normalizedQueue[i];
                    if (fetchedUrls.has(res.url)) continue;
                    
                    try {
                        const fileName = new URL(res.url).pathname.split('/').pop() || `file_${i}`;
                        const response = await smartFetch(res.url, preferredProxy);
                        const blob = await response.blob();
                        zip.file(`${res.folder}/${fileName}`, blob);
                        fetchedUrls.add(res.url);
                        log(`🔹 取得成功: ${fileName}`, "success");

                        // JSファイルの場合、中身をスキャンして隠れたJSパスを探す
                        if (fileName.endsWith('.js')) {
                            const text = await blob.text();
                            const subMatches = text.match(/["']\/static\/js\/[a-zA-Z0-9\._-]+\.js["']/g);
                            if (subMatches) {
                                subMatches.forEach(match => {
                                    const subPath = match.replace(/["']/g, '');
                                    const subUrl = new URL(subPath, urlInput).href;
                                    if (!fetchedUrls.has(subUrl)) {
                                        normalizedQueue.push({url: subUrl, folder: 'js/chunks'});
                                        log(`  └✨ 隠しJSを発見: ${subPath.split('/').pop()}`);
                                    }
                                });
                            }
                        }
                    } catch (e) {
                        log(`❌ 失敗: ${res.url}`, "error");
                    }
                    await sleep(1500); // サーバー攻撃と見なされないための待機
                }

                log("⚙️ ZIP生成中...");
                const content = await zip.generateAsync({type: "blob"});
                saveAs(content, `full_dump_${new URL(urlInput).hostname}.zip`);
                log("🏁 全工程完了！", "success");

            } catch (err) {
                log(`🛑 エラー: ${err.message}`, "error");
            } finally {
                downloadBtn.disabled = false;
                downloadBtn.innerText = "JS全取得・一括ダウンロード";
            }
        }
    </script>
</body>
</html>
